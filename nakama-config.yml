# Nakama configuration for local development
# Copy this file to local.yml and adjust as needed

name: nakama1

logger:
  level: DEBUG

database:
  address:
    - postgres:localdb@localhost:5432/nakama

runtime:
  path: ./backend/build

session:
  token_expiry_sec: 7200
  refresh_token_expiry_sec: 86400

socket:
  max_message_size_bytes: 4096
  outgoing_queue_size: 64

console:
  max_message_size_bytes: 16000000
